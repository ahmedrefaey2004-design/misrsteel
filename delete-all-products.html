<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>حذف كل المنتجات</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;800&display=swap" rel="stylesheet">
<style>
body{font-family:Cairo,sans-serif;background:#111;color:#fff;display:flex;align-items:center;justify-content:center;min-height:100vh;direction:rtl}
.box{background:#1a1a1a;border:1px solid #333;border-radius:12px;padding:32px;max-width:480px;width:90%;text-align:center}
h2{color:#ff4444;margin-bottom:8px}
p{color:#888;font-size:13px;margin-bottom:20px}
.prog-wrap{background:#333;border-radius:6px;height:12px;margin:16px 0;overflow:hidden}
.prog{height:100%;background:linear-gradient(to left,#cc0000,#ff4444);border-radius:6px;transition:width .3s;width:0%}
.status{font-size:12px;color:#aaa;margin:8px 0;min-height:18px}
.btn{padding:14px 32px;border-radius:8px;font-size:15px;font-weight:800;cursor:pointer;font-family:Cairo,sans-serif;border:none;width:100%;margin-bottom:8px}
.btn-red{background:#ff4444;color:#fff}
.btn-gray{background:#333;color:#aaa}
.done{background:#003300;border:1px solid #4ade80;border-radius:8px;padding:16px;margin-top:16px;display:none}
</style>
</head>
<body>
<div class="box">
  <h2>🗑️ حذف كل المنتجات</h2>
  <p>سيتم حذف جميع المنتجات من قاعدة البيانات نهائياً.<br>بعدها ارفع المنتجات الجديدة من Excel.</p>
  <div class="prog-wrap"><div class="prog" id="prog"></div></div>
  <div class="status" id="status">اضغط للبدء</div>
  <button class="btn btn-red" id="btn" onclick="startDelete()">🗑️ احذف كل المنتجات</button>
  <button class="btn btn-gray" onclick="window.location='admin-dashboard.html'">↩ رجوع للداشبورد</button>
  <div class="done" id="done">
    <div style="font-size:24px">✅</div>
    <div style="font-weight:800;margin:8px 0">تم حذف كل المنتجات!</div>
    <a href="admin-dashboard.html" style="display:inline-block;margin-top:8px;padding:10px 24px;background:#ff6000;color:#fff;border-radius:6px;font-weight:700;text-decoration:none">ارفع المنتجات الجديدة</a>
  </div>
</div>
<script>
var BACKEND = 'https://misrsteel-backend.vercel.app';
var ADMIN_TOKEN = 'misrsteel_admin_2025';

async function startDelete() {
  document.getElementById('btn').disabled = true;
  document.getElementById('btn').textContent = '⏳ جاري الحذف...';
  document.getElementById('status').textContent = 'جاري جلب المنتجات...';

  try {
    // Get all products
    var r = await fetch(BACKEND + '/api/admin/products?limit=500', {
      headers: {'x-admin-token': ADMIN_TOKEN}
    });
    var d = await r.json();
    var products = d.products || [];
    
    if (!products.length) {
      document.getElementById('status').textContent = 'لا يوجد منتجات!';
      document.getElementById('done').style.display = 'block';
      return;
    }

    document.getElementById('status').textContent = 'سيتم حذف ' + products.length + ' منتج...';
    
    var done = 0;
    for (var i = 0; i < products.length; i++) {
      var p = products[i];
      try {
        await fetch(BACKEND + '/api/admin/products/' + p.id, {
          method: 'DELETE',
          headers: {'x-admin-token': ADMIN_TOKEN}
        });
        done++;
      } catch(e) {}
      
      var pct = Math.round(((i+1)/products.length)*100);
      document.getElementById('prog').style.width = pct + '%';
      document.getElementById('status').textContent = 'تم حذف ' + done + ' من ' + products.length;
    }

    document.getElementById('status').textContent = '✅ تم حذف ' + done + ' منتج بنجاح!';
    document.getElementById('done').style.display = 'block';
    document.getElementById('btn').style.display = 'none';
  } catch(e) {
    document.getElementById('status').textContent = '❌ خطأ: ' + e.message;
    document.getElementById('btn').disabled = false;
    document.getElementById('btn').textContent = '🗑️ حاول مرة أخرى';
  }
}
</script>
</body>
</html>
