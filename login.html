<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تسجيل الدخول — مصر ستيل</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<style>
.login-page{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:linear-gradient(135deg,#1a0800,#2d1200,#111)}
.login-box{background:var(--white);width:100%;max-width:440px;border-radius:12px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.login-head{background:var(--black);padding:28px 28px 24px;text-align:center}
.login-logo{font-size:22px;font-weight:800;color:var(--orange);margin-bottom:4px}
.login-logo-sub{font-size:11px;color:rgba(255,255,255,.4)}
.login-tabs{display:flex;border-bottom:1px solid var(--border)}
.ltab{flex:1;padding:14px;background:none;border:none;border-bottom:3px solid transparent;font-size:13px;font-weight:700;color:var(--muted);cursor:pointer;font-family:inherit;transition:all .2s;margin-bottom:-1px}
.ltab.active{color:var(--orange);border-bottom-color:var(--orange)}
.login-body{padding:28px}
.login-panel{display:none}.login-panel.show{display:block}
.lf{display:flex;flex-direction:column;gap:4px;margin-bottom:14px}
.lf label{font-size:11px;font-weight:700;color:var(--muted)}
.lf input,.lf select{padding:11px 13px;border:1.5px solid var(--border);border-radius:6px;font-size:13px;font-family:inherit;outline:none;transition:border-color .2s}
.lf input:focus,.lf select:focus{border-color:var(--orange)}
.lf-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.login-btn{width:100%;padding:13px;background:var(--orange);color:#fff;border:none;border-radius:6px;font-size:14px;font-weight:800;margin-top:4px;transition:background .2s;font-family:inherit;cursor:pointer}
.login-btn:hover{background:var(--orange-dk)}
.login-note{font-size:11px;color:var(--muted);text-align:center;margin-top:10px;line-height:1.6}
.login-note a{color:var(--orange)}
.login-success{display:none;text-align:center;padding:20px 0}
.ls-icon{font-size:48px;margin-bottom:10px}
.ls-title{font-size:18px;font-weight:800;margin-bottom:6px}
.ls-sub{font-size:12px;color:var(--muted);line-height:1.7}
.divider{display:flex;align-items:center;gap:10px;margin:14px 0;color:var(--muted);font-size:12px}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}
.btn-wa-login{width:100%;padding:12px;background:#25D366;color:#fff;border:none;border-radius:6px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:8px;transition:background .2s}
.btn-wa-login:hover{background:#128c7e}
</style>
</head>
<body>
<div class="login-page">
  <div class="login-box">
    <div class="login-head">
      <div class="login-logo">مصر ستيل</div>
      <div class="login-logo-sub">بوابة العملاء</div>
    </div>
    <div class="login-tabs">
      <button class="ltab active" onclick="switchTab('login',this)">تسجيل الدخول</button>
      <button class="ltab" onclick="switchTab('register',this)">حساب جديد</button>
    </div>
    <div class="login-body">

      <!-- LOGIN -->
      <div class="login-panel show" id="panelLogin">
        <form onsubmit="doLogin(event)">
          <div class="lf"><label>الإيميل أو رقم الواتساب</label><input type="text" placeholder="ahmed@company.com" required></div>
          <div class="lf"><label>كلمة المرور</label><input type="password" placeholder="••••••••" required></div>
          <button type="submit" class="login-btn">دخول</button>
        </form>
        <div class="divider">أو</div>
        <button class="btn-wa-login" onclick="loginWA()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="white"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
          دخول عبر واتساب
        </button>
        <p class="login-note">ليس لديك حساب؟ <a href="#" onclick="switchTab('register')">سجّل الآن</a></p>
        <div class="login-success" id="loginOk">
          <div class="ls-icon">✅</div>
          <div class="ls-title">مرحباً بك!</div>
          <div class="ls-sub">جاري تحويلك...</div>
        </div>
      </div>

      <!-- REGISTER -->
      <div class="login-panel" id="panelRegister">
        <form onsubmit="doRegister(event)">
          <div class="lf-row">
            <div class="lf"><label>الاسم</label><input type="text" placeholder="أحمد" required></div>
            <div class="lf"><label>اسم الشركة</label><input type="text" placeholder="اختياري"></div>
          </div>
          <div class="lf"><label>الإيميل</label><input type="email" placeholder="ahmed@company.com" required></div>
          <div class="lf-row">
            <div class="lf"><label>واتساب</label><input type="tel" placeholder="+201..."></div>
            <div class="lf"><label>الدولة</label>
              <select>
                <option>🇪🇬 مصر</option><option>🇮🇶 العراق</option>
                <option>🇸🇦 السعودية</option><option>🇦🇪 الإمارات</option>
                <option>🇰🇼 الكويت</option><option>🇯🇴 الأردن</option>
                <option>🌍 أخرى</option>
              </select>
            </div>
          </div>
          <div class="lf"><label>كلمة المرور</label><input type="password" placeholder="8 أحرف على الأقل" required></div>
          <button type="submit" class="login-btn">إنشاء الحساب</button>
        </form>
        <p class="login-note">لديك حساب؟ <a href="#" onclick="switchTab('login')">سجّل دخولك</a></p>
        <div class="login-success" id="regOk">
          <div class="ls-icon">🎉</div>
          <div class="ls-title">تم التسجيل!</div>
          <div class="ls-sub">سنتواصل معك على واتساب لتفعيل الحساب خلال 24 ساعة</div>
        </div>
      </div>

    </div>
  </div>
</div>

<script>
function switchTab(tab, btn){
  document.querySelectorAll('.ltab').forEach(function(b){b.classList.remove('active')});
  document.querySelectorAll('.login-panel').forEach(function(p){p.classList.remove('show')});
  if(btn) btn.classList.add('active');
  else document.querySelectorAll('.ltab')[tab==='login'?0:1].classList.add('active');
  document.getElementById('panel'+(tab.charAt(0).toUpperCase()+tab.slice(1))).classList.add('show');
}
function doLogin(e){
  e.preventDefault();
  document.querySelector('#panelLogin form').style.display='none';
  document.querySelector('#panelLogin .divider').style.display='none';
  document.querySelector('#panelLogin .btn-wa-login').style.display='none';
  document.querySelector('#panelLogin .login-note').style.display='none';
  document.getElementById('loginOk').style.display='block';
  setTimeout(function(){window.location='index.html'},1500);
}
function doRegister(e){
  e.preventDefault();
  document.querySelector('#panelRegister form').style.display='none';
  document.querySelector('#panelRegister .login-note').style.display='none';
  document.getElementById('regOk').style.display='block';
}
function loginWA(){
  window.open('https://wa.me/201050595250?text=أريد تسجيل الدخول لحساب مصر ستيل','_blank');
}
</script>
</body>
</html>
