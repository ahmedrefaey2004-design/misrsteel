<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>رفع المنتجات — مصر ستيل</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Cairo,sans-serif;background:#0a0a0a;color:#fff;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;direction:rtl}
.box{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:16px;padding:32px;max-width:520px;width:100%;text-align:center}
.logo{font-size:22px;font-weight:800;color:#ff6000;margin-bottom:4px}
.logo-sub{font-size:11px;color:#555;margin-bottom:24px}
h2{font-size:18px;font-weight:800;margin-bottom:8px}
.count{color:#ff6000;font-size:32px;font-weight:800;margin:12px 0}
.count-label{font-size:12px;color:#555;margin-bottom:20px}
.prog-wrap{background:#222;border-radius:8px;height:14px;margin:16px 0;overflow:hidden;border:1px solid #333}
.prog{height:100%;background:linear-gradient(to left,#d94f00,#ff6000);border-radius:8px;transition:width .4s ease;width:0%}
.status{font-size:12px;color:#666;margin:8px 0 16px;min-height:18px}
.btn{background:#ff6000;color:#fff;border:none;padding:14px 0;border-radius:8px;font-size:15px;font-weight:800;cursor:pointer;font-family:Cairo,sans-serif;width:100%;transition:all .2s}
.btn:hover{background:#d94f00}
.btn:disabled{opacity:.4;cursor:not-allowed}
.stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:20px}
.stat{background:#111;border:1px solid #222;border-radius:8px;padding:12px}
.stat-num{font-size:22px;font-weight:800}
.stat-num.green{color:#4ade80}
.stat-num.red{color:#f87171}
.stat-label{font-size:10px;color:#555;margin-top:2px}
.done-box{background:#001a00;border:1px solid #4ade80;border-radius:10px;padding:20px;margin-top:20px;display:none}
.done-icon{font-size:40px;margin-bottom:8px}
.done-title{font-size:16px;font-weight:800;color:#4ade80;margin-bottom:4px}
.done-sub{font-size:12px;color:#666;margin-bottom:14px}
.done-btn{display:inline-block;padding:10px 24px;background:#ff6000;color:#fff;border-radius:6px;text-decoration:none;font-weight:700;font-size:13px}
.log{margin-top:16px;text-align:right;max-height:120px;overflow-y:auto;background:#111;border-radius:6px;padding:8px}
.log-item{font-size:10px;color:#555;padding:2px 0;border-bottom:1px solid #1a1a1a}
.log-item.ok{color:#4ade80}
.log-item.err{color:#f87171}
</style>
</head>
<body>
<div class="box">
  <div class="logo">مصر ستيل</div>
  <div class="logo-sub">MISR STEEL · أداة رفع المنتجات</div>
  <h2>رفع المنتجات الجديدة</h2>
  <div class="count" id="total-count">51</div>
  <div class="count-label">منتج جاهز للرفع (15 كرسي بار + 36 غرفة نوم)</div>
  <div class="prog-wrap"><div class="prog" id="prog"></div></div>
  <div class="status" id="status">اضغط الزرار للبدء</div>
  <button class="btn" id="btn" onclick="startUpload()">🚀 ابدأ رفع المنتجات</button>
  <div class="stats">
    <div class="stat"><div class="stat-num green" id="done-count">0</div><div class="stat-label">تم رفعه</div></div>
    <div class="stat"><div class="stat-num red" id="fail-count">0</div><div class="stat-label">فشل</div></div>
  </div>
  <div class="log" id="log" style="display:none"></div>
  <div class="done-box" id="doneBox">
    <div class="done-icon">✅</div>
    <div class="done-title">تم رفع كل المنتجات!</div>
    <div class="done-sub">يمكنك الآن تحديد الأسعار من لوحة الإدارة</div>
    <a href="https://misrsteel.vercel.app/admin-dashboard.html" class="done-btn">⚙️ فتح لوحة الإدارة</a>
  </div>
</div>

var done=0, failed=0;

function addLog(msg, ok){
  var log=document.getElementById('log');
  log.style.display='block';
  var item=document.createElement('div');
  item.className='log-item '+(ok?'ok':'err');
  item.textContent=msg;
  log.insertBefore(item, log.firstChild);
}

async function startUpload(){
  document.getElementById('btn').disabled=true;
  document.getElementById('btn').textContent='⏳ جاري الرفع...';
  
  for(var i=0;i<products.length;i++){
    var p=products[i];
    document.getElementById('status').textContent='('+(i+1)+'/'+products.length+') '+p.nameAr;
    document.getElementById('prog').style.width=Math.round(((i+1)/products.length)*100)+'%';
    
    try{
      var r=await fetch(BACKEND+'/api/admin/products',{
        method:'POST',
        headers:{'Content-Type':'application/json','x-admin-token':ADMIN_TOKEN},
        body:JSON.stringify(p)
      });
      if(r.ok){
        done++;
        addLog('✅ '+p.nameAr, true);
      } else {
        failed++;
        var err=await r.text();
        addLog('❌ '+p.nameAr+': '+err.substring(0,50), false);
      }
    } catch(e){
      failed++;
      addLog('❌ '+p.nameAr+': '+e.message, false);
    }
    
    document.getElementById('done-count').textContent=done;
    document.getElementById('fail-count').textContent=failed;
    await new Promise(res=>setTimeout(res,300));
  }
  
  document.getElementById('status').textContent='✅ اكتمل الرفع — '+done+' منتج';
  document.getElementById('btn').style.display='none';
  if(done>0) document.getElementById('doneBox').style.display='block';
}
</script>
