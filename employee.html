<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>بوابة الموظف — مصر ستيل</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--orange:#ff6000;--black:#111;--bg:#f5f5f5;--border:#e5e5e5;--green:#00a650;--muted:#888}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Cairo',sans-serif;background:var(--bg);direction:rtl;min-height:100vh}
.nav{background:var(--black);padding:0 20px;height:54px;display:flex;align-items:center;justify-content:space-between;border-bottom:2px solid var(--orange)}
.nav-logo{font-size:18px;font-weight:800;color:var(--orange)}
.page{max-width:700px;margin:0 auto;padding:20px}
.emp-card{background:#fff;border-radius:16px;padding:24px;margin-bottom:20px;display:flex;gap:20px;align-items:center;border:1px solid var(--border)}
.emp-avatar{width:80px;height:80px;border-radius:50%;background:linear-gradient(135deg,var(--orange),#d94f00);display:flex;align-items:center;justify-content:center;font-size:32px;flex-shrink:0;overflow:hidden}
.emp-avatar img{width:100%;height:100%;object-fit:cover}
.emp-name{font-size:22px;font-weight:800;margin-bottom:4px}
.emp-pos{font-size:13px;color:var(--muted)}
.emp-dept{display:inline-block;background:#fff3eb;color:var(--orange);padding:3px 12px;border-radius:10px;font-size:11px;font-weight:700;margin-top:6px}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px}
.stat{background:#fff;border:1px solid var(--border);border-radius:10px;padding:16px;text-align:center}
.stat-num{font-size:28px;font-weight:800;color:var(--orange)}
.stat-label{font-size:11px;color:var(--muted);margin-top:4px}
.att-card{background:#fff;border:1px solid var(--border);border-radius:12px;padding:20px}
.att-card h3{font-size:14px;font-weight:800;margin-bottom:14px;border-bottom:2px solid var(--orange);padding-bottom:8px}
table{width:100%;border-collapse:collapse;font-size:12px}
th{background:#f5f5f5;padding:8px 12px;text-align:right;font-weight:700;border-bottom:1px solid var(--border)}
td{padding:8px 12px;border-bottom:1px solid #f0f0f0}
.badge-in{background:#e8f5ec;color:var(--green);padding:2px 8px;border-radius:8px;font-size:10px;font-weight:700}
.badge-out{background:#fff0f0;color:#cc0000;padding:2px 8px;border-radius:8px;font-size:10px;font-weight:700}
.empty{text-align:center;padding:30px;color:var(--muted)}
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#0a0a0a,#1a1a1a)}
.login-box{background:#1e1e1e;border:1px solid #2a2a2a;border-radius:16px;padding:36px;max-width:360px;width:100%;text-align:center}
.login-logo{font-size:48px;margin-bottom:12px}
.login-title{font-size:20px;font-weight:800;color:var(--orange);margin-bottom:20px}
.inp{width:100%;padding:12px 16px;background:#111;border:2px solid #333;border-radius:8px;color:#fff;font-size:14px;font-family:inherit;outline:none;margin-bottom:12px;text-align:right}
.inp:focus{border-color:var(--orange)}
.login-btn{width:100%;padding:13px;background:var(--orange);color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:800;cursor:pointer;font-family:inherit}
.err{color:#f87171;font-size:12px;margin-top:8px;display:none}
@media(max-width:500px){.stats{grid-template-columns:repeat(2,1fr)}.emp-card{flex-direction:column;text-align:center}}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginWrap" style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#0a0a0a,#1a1a1a)">
  <div class="login-box">
    <div class="login-logo">👤</div>
    <div class="login-title">بوابة الموظف</div>
    <div style="font-size:12px;color:#555;margin-bottom:20px">أدخل رقمك الوظيفي للدخول</div>
    <input class="inp" id="empId" type="number" placeholder="رقم الموظف">
    <button class="login-btn" onclick="doLogin()">🚀 دخول</button>
    <div class="err" id="loginErr">❌ رقم الموظف غير صحيح</div>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dash" style="display:none">
  <div class="nav">
    <div class="nav-logo">مصر ستيل 🏭</div>
    <span id="navName" style="font-size:13px;color:#aaa"></span>
  </div>
  <div class="page">
    <!-- Employee Card -->
    <div class="emp-card">
      <div class="emp-avatar" id="empAvatar">👤</div>
      <div>
        <div class="emp-name" id="empName">-</div>
        <div class="emp-pos" id="empPos">-</div>
        <div class="emp-dept" id="empDept">-</div>
      </div>
    </div>

    <!-- Stats -->
    <div class="stats">
      <div class="stat"><div class="stat-num" id="st-days">0</div><div class="stat-label">أيام الحضور</div></div>
      <div class="stat"><div class="stat-num" id="st-late">0</div><div class="stat-label">تأخيرات</div></div>
      <div class="stat"><div class="stat-num" id="st-absent">0</div><div class="stat-label">غيابات</div></div>
    </div>

    <!-- Attendance Table -->
    <div class="att-card">
      <h3>📋 سجل الحضور — هذا الشهر</h3>
      <div id="attTable"><div class="empty">⏳ جاري التحميل...</div></div>
    </div>
  </div>
</div>

<script>
var BACKEND = 'https://misrsteel-backend.vercel.app';
var currentEmp = null;

async function doLogin() {
  var id = document.getElementById('empId').value.trim();
  if (!id) return;
  try {
    var r = await fetch(BACKEND + '/api/employee/' + id);
    var d = await r.json();
    if (!r.ok || !d.employee) {
      document.getElementById('loginErr').style.display = 'block';
      return;
    }
    currentEmp = d.employee;
    showDash(d);
  } catch(e) {
    document.getElementById('loginErr').style.display = 'block';
  }
}

function showDash(data) {
  document.getElementById('loginWrap').style.display = 'none';
  document.getElementById('dash').style.display = 'block';

  var emp = data.employee;
  document.getElementById('navName').textContent = emp.name;
  document.getElementById('empName').textContent = emp.name;
  document.getElementById('empPos').textContent = emp.position || 'موظف';
  document.getElementById('empDept').textContent = emp.department || 'المصنع';

  if (emp.photo) {
    document.getElementById('empAvatar').innerHTML = '<img src="' + emp.photo + '">';
  }

  var att = data.attendance || [];

  // Stats
  var inRecords = att.filter(function(a){ return a.type === 'in'; });
  document.getElementById('st-days').textContent = inRecords.length;
  document.getElementById('st-late').textContent = inRecords.filter(function(a){
    var h = new Date(a.timestamp).getHours();
    return h >= 9; // متأخر بعد 9 صباحاً
  }).length;

  // Attendance table
  if (!att.length) {
    document.getElementById('attTable').innerHTML = '<div class="empty">لا توجد سجلات هذا الشهر</div>';
    return;
  }

  var html = '<table><tr><th>التاريخ</th><th>الوقت</th><th>النوع</th></tr>';
  att.forEach(function(a) {
    var dt = new Date(a.timestamp);
    var date = dt.toLocaleDateString('ar-EG');
    var time = dt.toLocaleTimeString('ar-EG', {hour:'2-digit', minute:'2-digit'});
    var badge = a.type === 'in'
      ? '<span class="badge-in">✅ حضور</span>'
      : '<span class="badge-out">🚪 انصراف</span>';
    html += '<tr><td>' + date + '</td><td>' + time + '</td><td>' + badge + '</td></tr>';
  });
  html += '</table>';
  document.getElementById('attTable').innerHTML = html;
}

// Check URL param ?id=X
var urlId = new URLSearchParams(location.search).get('id');
if (urlId) {
  document.getElementById('empId').value = urlId;
  doLogin();
}
</script>
</body>
</html>
